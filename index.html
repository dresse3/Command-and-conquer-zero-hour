<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Zero Hour RTS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #game {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        cursor: crosshair;
        image-rendering: pixelated;
        touch-action: none; /* we handle all gestures ourselves */
      }
      /* zero-size probes used to read the device safe-area insets in JS */
      #ins-top,
      #ins-bottom {
        position: fixed;
        left: 0;
        width: 0;
        pointer-events: none;
        visibility: hidden;
      }
      #ins-top { top: 0; height: env(safe-area-inset-top, 0px); }
      #ins-bottom { bottom: 0; height: env(safe-area-inset-bottom, 0px); }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #d0d0d0;
        font-family: system-ui, sans-serif;
        font-size: 18px;
        letter-spacing: 2px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BxxHnMq3.js"></script>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ins-top"></div>
    <div id="ins-bottom"></div>
    <div id="loading">INITIALIZING BATTLEFIELD…</div>
  </body>
</html>
