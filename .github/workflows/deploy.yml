name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to the gh-pages branch on every push
# to main. Pages source must be set once: Settings -> Pages -> Deploy from a
# branch -> gh-pages -> / (root).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
